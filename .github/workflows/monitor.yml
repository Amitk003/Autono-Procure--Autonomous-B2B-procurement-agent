name: Autono-Procure Monitor

on:
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run procurement demo
        run: npm run demo
        env:
          ANAKIN_API_KEY: ${{ secrets.ANAKIN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LOG_LEVEL: info

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: procurement-results
          path: data/*.xlsx
          if-no-files-found: warn
          retention-days: 7
